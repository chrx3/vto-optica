<?xml version="1.0" encoding="UTF-8"?>
<!--
  Aviator Sunglasses
  Author: original artwork, Public Domain (CC0)
  Style:  teardrop-shaped lenses, thin metal frame, double-bridge,
          dark tinted lenses, short temple stubs.
  Canvas 1024 x 540 keeps the bounding box tight.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 540" width="1024" height="540">
  <defs>
    <linearGradient id="lensTintAviator" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <radialGradient id="aviatorGloss" cx="35%" cy="25%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="leftLensClip">
      <path d="M 200 285
               C 200 215, 270 175, 350 175
               C 440 175, 490 220, 490 290
               C 490 360, 460 445, 410 480
               C 360 510, 290 510, 250 470
               C 215 435, 200 360, 200 285 Z"/>
    </clipPath>
    <clipPath id="rightLensClip">
      <path d="M 824 285
               C 824 215, 754 175, 674 175
               C 584 175, 534 220, 534 290
               C 534 360, 564 445, 614 480
               C 664 510, 734 510, 774 470
               C 809 435, 824 360, 824 285 Z"/>
    </clipPath>
  </defs>

  <!-- Double bridge (aviator signature) -->
  <path d="M 482 220 Q 512 200 542 220"
        fill="none" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <line x1="490" y1="232" x2="490" y2="270"
        stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>
  <line x1="534" y1="232" x2="534" y2="270"
        stroke="#3a3a3a" stroke-width="6" stroke-linecap="round"/>

  <!-- Top brow bar (thin) connecting to outer-top of frames -->
  <path d="M 215 215 Q 215 200 240 200 L 470 195"
        fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>
  <path d="M 809 215 Q 809 200 784 200 L 554 195"
        fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>

  <!-- Temples — short stubs -->
  <path d="M 215 220 L 90 200"
        fill="none" stroke="#2a2a2a" stroke-width="10" stroke-linecap="round"/>
  <path d="M 809 220 L 934 200"
        fill="none" stroke="#2a2a2a" stroke-width="10" stroke-linecap="round"/>

  <!-- LEFT lens (dark tint + gloss, clipped to teardrop) -->
  <g clip-path="url(#leftLensClip)">
    <rect x="180" y="160" width="320" height="360" fill="url(#lensTintAviator)"/>
    <rect x="180" y="160" width="320" height="360" fill="url(#aviatorGloss)"/>
  </g>
  <path d="M 200 285
           C 200 215, 270 175, 350 175
           C 440 175, 490 220, 490 290
           C 490 360, 460 445, 410 480
           C 360 510, 290 510, 250 470
           C 215 435, 200 360, 200 285 Z"
        fill="none" stroke="#2a2a2a" stroke-width="6"/>

  <!-- RIGHT lens -->
  <g clip-path="url(#rightLensClip)">
    <rect x="524" y="160" width="320" height="360" fill="url(#lensTintAviator)"/>
    <rect x="524" y="160" width="320" height="360" fill="url(#aviatorGloss)"/>
  </g>
  <path d="M 824 285
           C 824 215, 754 175, 674 175
           C 584 175, 534 220, 534 290
           C 534 360, 564 445, 614 480
           C 664 510, 734 510, 774 470
           C 809 435, 824 360, 824 285 Z"
        fill="none" stroke="#2a2a2a" stroke-width="6"/>
</svg>
