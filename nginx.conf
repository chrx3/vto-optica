server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache agresivo para assets con hash (Vite los genera así)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MediaPipe scripts y modelos: cache corto para permitir updates sin problemas
    location ~* ^/models/ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Lentes: cache medio
    location ~* ^/lenses/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # index.html SIEMPRE fresh (sin cache) para que deploys nuevos se vean
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files /index.html =404;
    }

    # SPA fallback: todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}